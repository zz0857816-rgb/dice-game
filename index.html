<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홀짝 주사위 게임</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #1e272e; 
            margin: 0;
            color: #333;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            text-align: center;
            width: 380px; 
        }

        .status-board {
            display: flex;
            justify-content: space-between;
            background-color: #f1f2f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 16px;
        }

        .coin-text { color: #f39c12; }
        .pot-text { color: #e74c3c; }

        .dice-display {
            font-size: 80px;
            margin: 20px 0;
            color: #2c3e50;
            font-weight: bold;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ecf0f1;
            border-radius: 15px;
        }

        /* 버튼 그룹 공통 스타일 */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .btn-group-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 12px 8px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; }

        /* 버튼 색상 정의 */
        .btn-bet { background-color: #e67e22; min-width: 60px; }
        .btn-even { background-color: #27ae60; }
        .btn-odd { background-color: #2980b9; }
        .btn-continue { background-color: #c0392b; } 
        .btn-take { background-color: #8e44ad; }
        .btn-retry { background-color: #7f8c8d; }
        
        /* 결과 메시지창 개선 */
        #result-message {
            font-size: 16px;
            font-weight: bold;
            min-height: 60px; 
            padding: 10px;
            color: #555;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            line-height: 1.6;
            word-break: keep-all; 
        }

        /* 배수 강조 텍스트 */
        .highlight-multiplier {
            color: #e74c3c;
            font-size: 18px;
        }

        /* 관리자 영역 스타일 */
        .admin-section {
            margin-top: 25px;
            border-top: 1px dashed #bdc3c7;
            padding-top: 15px;
        }
        .btn-admin-toggle { background-color: #34495e; font-size: 12px; padding: 6px 12px; width: auto; flex: none; }
        .admin-panel { display: none; margin-top: 12px; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        .admin-input { padding: 8px; width: 120px; border-radius: 5px; border: 1px solid #ccc; text-align: center; font-size: 14px; margin-right: 5px; }
        .btn-admin-action { background-color: #2c3e50; padding: 8px 12px; width: auto; font-size: 13px; inline-size: max-content; }
    </style>
</head>
<body>

<div class="game-container">
    <h2>🎲 홀짝 주사위 게임</h2>
    
    <div class="status-board">
        <div class="coin-text">💰 내 코인: <span id="my-coins">100</span></div>
        <div class="pot-text">🔥 판돈: <span id="current-pot">0</span></div>
    </div>
    
    <div class="dice-display" id="dice">?</div>
    
    <div id="result-message">먼저 베팅할 코인을 선택하세요!</div>

    <div class="btn-group-wrap" id="bet-buttons">
        <button class="btn-bet" onclick="selectBet(1)">1</button>
        <button class="btn-bet" onclick="selectBet(5)">5</button>
        <button class="btn-bet" onclick="selectBet(10)">10</button>
        <button class="btn-bet" onclick="selectBet(50)">50</button>
        <button class="btn-bet" onclick="selectBet(100)">100</button>
    </div>

    <div class="btn-group" id="choice-buttons" style="display: none;">
        <button class="btn-even" onclick="selectChoice('even')">짝 (Even)</button>
        <button class="btn-odd" onclick="selectChoice('odd')">홀 (Odd)</button>
    </div>

    <div class="btn-group" id="win-buttons" style="display: none;">
        <button class="btn-continue" onclick="continueGame()">계속하기 (다음 배수 도전!)</button>
        <button class="btn-take" onclick="takeReward()">보상받고 그만두기</button>
    </div>

    <div class="btn-group" id="lose-buttons" style="display: none;">
        <button class="btn-retry" onclick="resetGame()">다시 시도</button>
        <button class="btn-take" onclick="resetGame()">그만두기</button>
    </div>

    <div class="admin-section">
        <button class="btn-admin-toggle" onclick="toggleAdminView()">⚙️ 관리자 메뉴</button>
        <div class="admin-panel" id="admin-panel">
            <div id="admin-auth">
                <input type="password" id="admin-pw" class="admin-input" placeholder="비밀번호 입력">
                <button class="btn-admin-action" onclick="checkAdminPassword()">확인</button>
            </div>
            <div id="admin-controls" style="display: none;">
                <input type="number" id="coin-amount" class="admin-input" placeholder="추가할 코인 수">
                <button class="btn-admin-action" style="background-color: #27ae60;" onclick="addAdminCoins()">코인 추가</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 로컬 스토리지에서 코인 불러오기
    let myCoins = parseInt(localStorage.getItem('casino_my_coins'));
    if (isNaN(myCoins)) {
        myCoins = 100;
        localStorage.setItem('casino_my_coins', myCoins);
    }

    let initialBet = 0;         
    let currentMultiplier = 2;  
    let currentPot = 0;         
    let isRolling = false; 
    let userChoice = '';   

    const diceEl = document.getElementById('dice');
    const msgEl = document.getElementById('result-message');
    const myCoinsEl = document.getElementById('my-coins');
    const currentPotEl = document.getElementById('current-pot');
    
    const betBtns = document.getElementById('bet-buttons');
    const choiceBtns = document.getElementById('choice-buttons');
    const winBtns = document.getElementById('win-buttons');
    const loseBtns = document.getElementById('lose-buttons');

    function updateBoard() {
        myCoinsEl.textContent = myCoins;
        currentPotEl.textContent = currentPot;
        localStorage.setItem('casino_my_coins', myCoins);
    }

    // [1단계] 코인 베팅
    function selectBet(amount) {
        if (myCoins < amount) {
            alert("보유 코인이 부족합니다! 관리자 메뉴에서 충전하세요.");
            return;
        }
        myCoins -= amount;
        
        initialBet = amount;
        currentPot = amount;
        currentMultiplier = 2; 
        updateBoard();

        betBtns.style.display = 'none';
        choiceBtns.style.display = 'flex';
        msgEl.innerHTML = `<span><b>${amount}코인</b> 베팅 완료!</span><span>주사위가 짝일지 홀일지 고르세요. (현재 목표: <b>2배</b>)</span>`;
    }

    // [2단계] 홀/짝 선택
    function selectChoice(choice) {
        if (isRolling) return;
        userChoice = choice;
        startDiceRoll();
    }

    // 주사위 섞기 애니메이션
    function startDiceRoll() {
        isRolling = true;
        choiceBtns.style.display = 'none'; 
        msgEl.textContent = "주사위를 마구 섞는 중... 🎲";
        
        let rollCount = 0;
        let rollInterval = setInterval(() => {
            diceEl.textContent = Math.floor(Math.random() * 6) + 1;
            rollCount++;
            
            if (rollCount >= 15) {
                clearInterval(rollInterval);
                finishGame(); 
            }
        }, 80);
    }

    // 주사위 결과 가리기 및 조작된 정답 판정 (80% 확률로 무조건 패배)
    function finishGame() {
        isRolling = false;
        
        const randomChance = Math.random(); 
        const isWin = randomChance >= 0.8; // 20% 확률로만 true(승리), 80% 확률로 false(패배)

        let finalNum;
        
        if (!isWin) {
            // 80% 실패 로직: 유저가 고른 것과 반대되는 숫자를 강제로 출력
            if (userChoice === 'even') {
                finalNum = [1, 3, 5][Math.floor(Math.random() * 3)]; // 짝 골랐으니 홀 출력
            } else {
                finalNum = [2, 4, 6][Math.floor(Math.random() * 3)]; // 홀 골랐으니 짝 출력
            }
        } 
        else {
            // 20% 성공 로직: 유저가 고른 것과 일치하는 숫자를 출력
            if (userChoice === 'even') {
                finalNum = [2, 4, 6][Math.floor(Math.random() * 3)]; 
            } else {
                finalNum = [1, 3, 5][Math.floor(Math.random() * 3)];
            }
        }

        const isEven = (finalNum % 2 === 0);
        const korResult = isEven ? '짝' : '홀';
        diceEl.textContent = finalNum; 

        if (isWin) {
            currentPot = initialBet * currentMultiplier; 
            
            msgEl.innerHTML = `<span>정답입니다! 결과: <b>[${finalNum} / ${korResult}]</b></span>
                               <span>판돈이 <b class="highlight-multiplier">${currentMultiplier}배 (${currentPot}코인)</b>가 되었습니다! 🎉</span>`;
            
            currentMultiplier += 2; 
            winBtns.style.display = 'flex';
        } else {
            currentPot = 0;
            // 들키지 않게 괄호 문구 삭제
            msgEl.innerHTML = `<span>틀렸습니다! 결과: <b>[${finalNum} / ${korResult}]</b> 😢</span>`;
            loseBtns.style.display = 'flex';
        }
        updateBoard();
    }

    function continueGame() {
        winBtns.style.display = 'none';
        choiceBtns.style.display = 'flex';
        diceEl.textContent = '?'; 
        msgEl.innerHTML = `<span>🔥 다음 성공 시 판돈의 <b class="highlight-multiplier">${currentMultiplier}배 (${initialBet * currentMultiplier}코인)</b> 획득!</span>
                           <span>다음 홀/짝을 신중하게 선택하세요!</span>`;
    }

    function takeReward() {
        myCoins += currentPot;
        msgEl.innerHTML = `<span>성공적으로 <b>${currentPot}코인</b>을 챙겼습니다! 💰</span>`;
        resetToMain();
    }

    function resetGame() {
        msgEl.textContent = "베팅할 코인을 다시 선택하세요!";
        resetToMain();
    }

    function resetToMain() {
        currentPot = 0;
        initialBet = 0;
        currentMultiplier = 2;
        updateBoard();
        winBtns.style.display = 'none';
        loseBtns.style.display = 'none';
        choiceBtns.style.display = 'none';
        betBtns.style.display = 'flex'; 
        diceEl.textContent = '?';       
    }

    /* ================= 관리자 기능 스크립트 ================= */
    function toggleAdminView() {
        const panel = document.getElementById('admin-panel');
        if (panel.style.display === 'none' || panel.style.display === '') {
            panel.style.display = 'block';
        } else {
            panel.style.display = 'none';
            document.getElementById('admin-auth').style.display = 'block';
            document.getElementById('admin-controls').style.display = 'none';
            document.getElementById('admin-pw').value = '';
        }
    }

    function checkAdminPassword() {
        const pw = document.getElementById('admin-pw').value;
        if (pw === '123123') {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-controls').style.display = 'block';
        } else {
            alert('비밀번호가 올바르지 않습니다!');
        }
    }

    function addAdminCoins() {
        const amountInput = document.getElementById('coin-amount');
        const amount = parseInt(amountInput.value);
        
        if (isNaN(amount) || amount <= 0) {
            alert('올바른 코인 수량을 입력해주세요.');
            return;
        }
        
        myCoins += amount;
        updateBoard();
        alert(`성공적으로 ${amount} 코인이 추가되었습니다!`);
        amountInput.value = '';
        toggleAdminView(); 
    }

    updateBoard();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홀짝 주사위 게임</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #000; margin: 0; color: #333; padding: 20px; box-sizing: border-box; overflow-x: hidden; }
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .box-container { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1); text-align: center; width: 380px; position: relative; z-index: 10; box-sizing: border-box; margin-bottom: 20px; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-login { background-color: #2980b9; width: 100%; padding: 15px; font-size: 16px; margin-top: 10px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-login:hover { opacity: 0.9; }
        .referral-section { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #bdc3c7; }
        .status-board { display: flex; flex-direction: column; gap: 10px; background-color: #f1f2f6; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 16px; }
        .status-row { display: flex; justify-content: space-between; }
        .user-text { color: #2c3e50; font-size: 14px; }
        .coin-text { color: #f39c12; }
        .pot-text { color: #e74c3c; }
        .dice-display { font-size: 80px; margin: 20px 0; color: #2c3e50; font-weight: bold; height: 90px; display: flex; align-items: center; justify-content: center; background-color: #ecf0f1; border-radius: 15px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .btn-group-wrap { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px; }
        button { flex: 1; padding: 12px 8px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; }
        .btn-bet { background-color: #e67e22; min-width: 60px; }
        .btn-even { background-color: #27ae60; }
        .btn-odd { background-color: #2980b9; }
        .btn-continue { background-color: #c0392b; } 
        .btn-take { background-color: #8e44ad; }
        .btn-retry { background-color: #7f8c8d; }
        #result-message { font-size: 16px; font-weight: bold; min-height: 60px; padding: 10px; color: #555; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 15px; line-height: 1.6; word-break: keep-all; }
        .highlight-multiplier { color: #e74c3c; font-size: 18px; }
        .admin-section { margin-top: 25px; border-top: 1px dashed #bdc3c7; padding-top: 15px; }
        .btn-admin-toggle { background-color: #34495e; font-size: 12px; padding: 6px 12px; width: auto; flex: none; }
        .admin-panel { display: none; margin-top: 12px; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        .admin-input { padding: 8px; width: 100%; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; text-align: center; font-size: 14px; margin-bottom: 10px; }
        .admin-btn-row { display: flex; gap: 5px; }
        .btn-admin-action { padding: 8px; width: 100%; font-size: 13px; }
        .external-link { display: inline-block; margin-top: 10px; color: #bdc3c7; text-decoration: none; font-size: 14px; transition: color 0.2s; z-index: 10; }
        .external-link:hover { color: #ffffff; text-decoration: underline; }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="box-container" id="login-screen">
    <h2>🔐 게임 로그인</h2>
    <input type="text" id="login-id" class="login-input" placeholder="아이디 입력">
    <input type="password" id="login-pw" class="login-input" placeholder="비밀번호 입력">
    <div class="referral-section">
        <p style="font-size: 13px; color: #7f8c8d; margin-top: 0;">추천인 코드를 입력하면 500코인 보너스!</p>
        <input type="text" id="referral-code" class="login-input" placeholder="추천인 코드">
    </div>
    <button class="btn-login" onclick="processLogin()">접속하기</button>
</div>

<div class="box-container" id="game-screen" style="display: none;">
    <h2>🎲 홀짝 주사위 게임</h2>
    <div class="status-board">
        <div class="status-row user-text">👤 계정: <span id="current-user-id">-</span></div>
        <div class="status-row">
            <div class="coin-text">💰 보유: <span id="my-coins">0</span></div>
            <div class="pot-text">🔥 판돈: <span id="current-pot">0</span></div>
        </div>
    </div>
    <div class="dice-display" id="dice">?</div>
    <div id="result-message">먼저 베팅할 코인을 선택하세요!</div>
    <div class="btn-group-wrap" id="bet-buttons">
        <button class="btn-bet" onclick="selectBet(1)">1</button>
        <button class="btn-bet" onclick="selectBet(5)">5</button>
        <button class="btn-bet" onclick="selectBet(10)">10</button>
        <button class="btn-bet" onclick="selectBet(50)">50</button>
        <button class="btn-bet" onclick="selectBet(100)">100</button>
    </div>
    <div class="btn-group" id="choice-buttons" style="display: none;">
        <button class="btn-even" onclick="selectChoice('even')">짝 (Even)</button>
        <button class="btn-odd" onclick="selectChoice('odd')">홀 (Odd)</button>
    </div>
    <div class="btn-group" id="win-buttons" style="display: none;">
        <button class="btn-continue" onclick="continueGame()">계속하기</button>
        <button class="btn-take" onclick="takeReward()">정산하기</button>
    </div>
    <div class="btn-group" id="lose-buttons" style="display: none;">
        <button class="btn-retry" onclick="resetGame()">다시하기</button>
    </div>
    <div class="admin-section">
        <button class="btn-admin-toggle" onclick="toggleAdminView()">⚙️ 관리자</button>
        <div class="admin-panel" id="admin-panel">
            <div id="admin-auth">
                <input type="password" id="admin-pw" class="admin-input" placeholder="비밀번호">
                <button class="btn-admin-action" style="background-color: #2c3e50;" onclick="checkAdminPassword()">확인</button>
            </div>
            <div id="admin-controls" style="display: none;">
                <input type="number" id="coin-amount" class="admin-input" placeholder="코인 수">
                <div class="admin-btn-row">
                    <button class="btn-admin-action" style="background-color: #27ae60;" onclick="adjustCoins('add')">충전</button>
                    <button class="btn-admin-action" style="background-color: #e74c3c;" onclick="adjustCoins('remove')">회수</button>
                </div>
            </div>
        </div>
    </div>
</div>

<a href="https://cafe.naver.com/" target="_blank" class="external-link">🌐 공식 커뮤니티 방문하기</a>

<script>
    function fireConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, vx: (Math.random() - 0.5) * 10, vy: Math.random() * 10 + 5, color: `hsl(${Math.random() * 360}, 100%, 50%)` });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 8, 8); });
            if (particles[0].y < canvas.height) requestAnimationFrame(animate);
            else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        animate();
    }

    let currentUserKey = '', myCoins = 0, initialBet = 0, currentMultiplier = 2, currentPot = 0, isRolling = false, userChoice = '';   
    const diceEl = document.getElementById('dice'), msgEl = document.getElementById('result-message'), myCoinsEl = document.getElementById('my-coins'), currentPotEl = document.getElementById('current-pot'), betBtns = document.getElementById('bet-buttons'), choiceBtns = document.getElementById('choice-buttons'), winBtns = document.getElementById('win-buttons'), loseBtns = document.getElementById('lose-buttons');

    function processLogin() {
        const userId = document.getElementById('login-id').value.trim();
        const referral = document.getElementById('referral-code').value.trim();
        if (userId === '') { alert('아이디를 입력해주세요!'); return; }
        
        currentUserKey = 'casino_coins_' + userId;
        let savedCoins = localStorage.getItem(currentUserKey);

        if (savedCoins === null) {
            myCoins = 100; // 기본 지급
            // 추천인 코드 "kimbob" 확인 로직
            if (referral === 'kimbob') {
                myCoins += 500;
                alert(`추천인 [${referral}] 확인! 🎉 보너스 500코인이 추가되어 총 600코인으로 시작합니다!`);
            } else if (referral !== '') {
                alert('잘못된 추천인 코드입니다. 기본 100코인으로 시작합니다.');
            } else {
                alert(`환영합니다! 신규 가입 보너스 100코인이 지급되었습니다.`);
            }
        } else {
            myCoins = parseInt(savedCoins);
            alert(`환영합니다, ${userId}님!`);
        }

        document.getElementById('current-user-id').textContent = userId;
        updateBoard();
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
    }

    function updateBoard() { myCoinsEl.textContent = myCoins; currentPotEl.textContent = currentPot; if (currentUserKey !== '') localStorage.setItem(currentUserKey, myCoins); }
    function selectBet(amount) { if (myCoins < amount) { alert("코인이 부족합니다!"); return; } myCoins -= amount; initialBet = amount; currentPot = amount; currentMultiplier = 2; updateBoard(); betBtns.style.display = 'none'; choiceBtns.style.display = 'flex'; msgEl.innerHTML = `<span><b>${amount}코인</b> 베팅 완료!</span><span>홀/짝을 고르세요.</span>`; }
    function selectChoice(choice) { if (isRolling) return; userChoice = choice; startDiceRoll(); }
    function startDiceRoll() { isRolling = true; choiceBtns.style.display = 'none'; msgEl.textContent = "주사위 굴리는 중... 🎲"; let rollCount = 0; let rollInterval = setInterval(() => { diceEl.textContent = Math.floor(Math.random() * 6) + 1; rollCount++; if (rollCount >= 15) { clearInterval(rollInterval); finishGame(); } }, 80); }
    function finishGame() { isRolling = false; const isWin = Math.random() >= 0.8; let finalNum = (isWin ? (userChoice === 'even' ? [2,4,6] : [1,3,5]) : (userChoice === 'even' ? [1,3,5] : [2,4,6]))[Math.floor(Math.random() * 3)]; diceEl.textContent = finalNum; if (isWin) { currentPot = initialBet * currentMultiplier; msgEl.innerHTML = `<span>정답! 판돈 ${currentPot}코인 확보! 🎉</span>`; currentMultiplier += 2; winBtns.style.display = 'flex'; fireConfetti(); } else { currentPot = 0; msgEl.innerHTML = `<span>아쉽네요! 결과: ${finalNum} 😢</span>`; loseBtns.style.display = 'flex'; } updateBoard(); }
    function continueGame() { winBtns.style.display = 'none'; choiceBtns.style.display = 'flex'; diceEl.textContent = '?'; msgEl.innerHTML = `<span>다음 성공 시 ${currentMultiplier}배 도전!</span>`; }
    function takeReward() { myCoins += currentPot; msgEl.innerHTML = `<span>${currentPot}코인 획득! 💰</span>`; resetToMain(); }
    function resetGame() { resetToMain(); }
    function resetToMain() { currentPot = 0; initialBet = 0; currentMultiplier = 2; updateBoard(); winBtns.style.display = 'none'; loseBtns.style.display = 'none'; choiceBtns.style.display = 'none'; betBtns.style.display = 'flex'; diceEl.textContent = '?'; msgEl.textContent = "베팅할 코인을 선택하세요!"; }

    function toggleAdminView() { const panel = document.getElementById('admin-panel'); panel.style.display = (panel.style.display === 'block') ? 'none' : 'block'; }
    function checkAdminPassword() { if (document.getElementById('admin-pw').value === '1111') { document.getElementById('admin-auth').style.display = 'none'; document.getElementById('admin-controls').style.display = 'block'; } else { alert('비밀번호 틀림!'); } }
    function adjustCoins(mode) { let amount = Math.abs(parseInt(document.getElementById('coin-amount').value)); if (isNaN(amount)) return; if (mode === 'add') myCoins += amount; else myCoins = Math.max(0, myCoins - amount); updateBoard(); document.getElementById('coin-amount').value = ''; }
</script>
</body>
</html>
